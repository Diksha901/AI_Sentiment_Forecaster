services:
  - type: static
    name: ai-infosys-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

  - type: web
    name: ai-infosys-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.render.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET_KEY
        scope: project
      - key: GROQ_API_KEY
        scope: project
      - key: MONGODB_URI
        scope: project
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/chromadb
