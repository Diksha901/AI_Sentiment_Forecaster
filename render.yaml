services:
  - type: static_site
    name: ai-infosys-frontend
    root_dir: frontend
    build_command: cd frontend && npm install && npm run build
    publish_directory: frontend/dist

  - type: web_service
    name: ai-infosys-backend
    root_dir: backend
    runtime_image: python:3.11
    build_command: pip install -r requirements.txt
    start_command: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    env:
      - key: JWT_SECRET_KEY
        scope: project
      - key: GROQ_API_KEY
        scope: project
      - key: MONGODB_URI
        scope: project
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/chromadb
