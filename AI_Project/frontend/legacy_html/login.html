<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TrendAI - Professional Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
    <div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 py-4 md:px-10">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="size-8 text-primary">
                        <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M44 11.2727C44 14.0109 39.8386 16.3957 33.69 17.6364C39.8386 18.877 44 21.2618 44 24C44 26.7382 39.8386 29.123 33.69 30.3636C39.8386 31.6043 44 33.9891 44 36.7273C44 40.7439 35.0457 44 24 44C12.9543 44 4 40.7439 4 36.7273C4 33.9891 8.16144 31.6043 14.31 30.3636C8.16144 29.123 4 26.7382 4 24C4 21.2618 8.16144 18.877 14.31 17.6364C8.16144 16.3957 4 14.0109 4 11.2727C4 7.25611 12.9543 4 24 4C35.0457 4 44 7.25611 44 11.2727Z"
                                fill="currentColor"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold leading-tight tracking-tight">TrendAI</h2>
                </a>
                <div>
                    <a class="text-sm font-medium text-primary hover:underline" href="#">Support</a>
                </div>
            </header>
            <main class="flex flex-1 items-center justify-center p-4">
                <div
                    class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl overflow-hidden">
                    <div class="p-8">
                        <div class="mb-8 text-center">
                            <h1 class="text-2xl font-bold mb-2">Welcome Back</h1>
                            <p class="text-slate-500 dark:text-slate-400">Enter your credentials to access your
                                dashboard</p>
                        </div>
                        <form class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium mb-2 text-slate-700 dark:text-slate-300">Email
                                    Address</label>
                                <div class="relative">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                        <span class="material-symbols-outlined text-sm">mail</span>
                                    </div>
                                    <input
                                        class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100"
                                        placeholder="name@company.com" type="email" />
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label
                                        class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
                                    <a class="text-sm font-medium text-primary hover:text-primary/80" href="#">Forgot
                                        Password?</a>
                                </div>
                                <div class="relative flex items-center">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                        <span class="material-symbols-outlined text-sm">lock</span>
                                    </div>
                                    <input
                                        class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100"
                                        placeholder="••••••••" type="password" />
                                    <button
                                        class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                                        type="button">
                                        <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                                    </button>
                                </div>
                            </div>
                            <div class="flex items-center">
                                <input
                                    class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary dark:focus:ring-offset-slate-900 dark:bg-slate-700 dark:border-slate-600"
                                    id="remember" type="checkbox" />
                                <label class="ml-2 text-sm font-medium text-slate-600 dark:text-slate-400"
                                    for="remember">Remember me for 30 days</label>
                            </div>
                            <a href="user_dashboard.html"
                                class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-background-dark font-bold rounded-lg transition-colors shadow-lg shadow-primary/20 text-center block"
                                type="submit">
                                Sign In
                            </a>
                        </form>
                        <div class="relative my-8">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white dark:bg-slate-900/50 text-slate-500">Or continue with</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button
                                class="flex items-center justify-center gap-2 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                <img alt="Google Logo" class="w-5 h-5" data-alt="Google logo for authentication"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuEyJx6UvFE06lnARiaIo0xCyztazgM2Z4kCUAAxXKbnGBCdJOj9U79CxONEZRSC5ynAGkMJ8fhO_7nyC-q38Gtu3tmKgf11q25u-QO0v1Og3LPTopPozW7uL6oP3ckH0YL3yvhyTF_9DhFGOPgSfiwa92vtpdZHOYlyipy0Y2yWKYn1dRpVLu-cc0HwaLNn0C2JtidurK_owTGqA3E_wSQj0Xp7iVKbQy-E5Ee6QOX0R6DcG5D11xX1CQn-DLGDYS7jS4oZLgMz5k" />
                                <span class="text-sm font-medium">Google</span>
                            </button>
                            <button
                                class="flex items-center justify-center gap-2 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                <span class="material-symbols-outlined text-xl">brand_awareness</span>
                                <span class="text-sm font-medium">SSO</span>
                            </button>
                        </div>
                    </div>
                    <div
                        class="bg-slate-50 dark:bg-slate-800/30 p-6 text-center border-t border-slate-200 dark:border-slate-800">
                        <p class="text-sm text-slate-600 dark:text-slate-400">
                            Don't have an account?
                            <a class="font-bold text-primary hover:underline" href="signup.html">Start free trial</a>
                        </p>
                    </div>
                </div>
            </main>
            <footer class="p-6 text-center text-xs text-slate-500 dark:text-slate-500">
                © 2024 TrendAI Analytics Inc. All rights reserved.
                <div class="mt-2 flex justify-center gap-4">
                    <a class="hover:text-primary" href="#">Privacy Policy</a>
                    <a class="hover:text-primary" href="#">Terms of Service</a>
                </div>
            </footer>
        </div>
    </div>
</body>

</html>
